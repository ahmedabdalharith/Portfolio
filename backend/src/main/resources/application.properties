server.port=8080

# ─── H2 file-based DB (persists data between restarts) ───────────────────────
spring.datasource.url=jdbc:h2:file:./data/portfoliodb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Seed data ───────────────────────────────────────────────────────────────
spring.sql.init.mode=never

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=5ad7a9f9e3c2b8d4f6a1e7c3b9d5f2a8e4c6b3d9f1a7e5c2b8d4f6a3e9c7b5d2
jwt.expiration=86400000

# ─── Admin credentials ───────────────────────────────────────────────────────
admin.username=admin
admin.password=admin123

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.ahmed=INFO
spring.output.ansi.enabled=ALWAYS
